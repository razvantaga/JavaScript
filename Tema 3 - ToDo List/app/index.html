{% extends "partials/layout.html" %}

{% block content %}

<main id="toDoList" class="vh-100 d-flex align-items-center"
  style="background: linear-gradient(135deg, #667eea, #764ba2);">
  <section class="w-100">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-8 col-md-6 col-lg-5">

          <div class="card shadow-lg border-0 rounded-4 p-4 bg-dark text-light">

            <!-- Title -->
            <h3 class="text-center mb-4 fw-bold">📝 To Do List</h3>

            <!-- Input -->
            <div class="input-group mb-4">
              <input type="text" class="form-control form-control-lg" placeholder="Add a new task..." id="addTaskInput">
              <button class="btn btn-primary px-4">
                Add
              </button>
            </div>

            <!-- Task List -->
            <ul class="list-group list-group-flush">

              <li
                class="list-group-item d-flex justify-content-between align-items-center bg-transparent text-light border-secondary">
                <span>📌 This is the first task</span>
                <div class="btn-group btn-group-sm">
                  <a href="#" class="btn btn-outline-warning">Edit</a>
                  <a href="#" class="btn btn-outline-danger">Delete</a>
                </div>
              </li>

              <li
                class="list-group-item d-flex justify-content-between align-items-center bg-transparent text-light border-secondary">
                <span>✅ Another task</span>
                <div class="btn-group btn-group-sm">
                  <a href="#" class="btn btn-outline-warning">Edit</a>
                  <a href="#" class="btn btn-outline-danger">Delete</a>
                </div>
              </li>

              <li
                class="list-group-item d-flex justify-content-between align-items-center bg-transparent text-light border-secondary">
                <span>🔥 Important task</span>
                <div class="btn-group btn-group-sm">
                  <a href="#" class="btn btn-outline-warning">Edit</a>
                  <a href="#" class="btn btn-outline-danger">Delete</a>
                </div>
              </li>

            </ul>

            <!-- Footer -->
            <div class="mt-4 text-center small text-secondary">
              Total tasks: <span class="badge bg-primary">3</span>
            </div>

          </div>

        </div>
      </div>
    </div>
  </section>
</main>

{% endblock %}
