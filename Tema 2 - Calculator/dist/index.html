<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Documents</title>
    <link rel="stylesheet" href="/styles/style.min.css">
</head>
<body>

  

<main id="calculator" class="vh-100 d-flex align-items-center"
  style="background: linear-gradient(135deg, #667eea, #764ba2);">
  <section class="w-100">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-8 col-md-5 col-lg-4">

          <div class="card shadow-lg border-0 rounded-4 p-4 bg-dark bg-gradient">

            <!-- Display -->
            <input type="text" class="form-control form-control-lg text-end mb-4 rounded-3 shadow-sm" id="evaluateInput"
              disabled />

            <!-- Buttons -->
            <div class="d-grid gap-3">

              <div class="d-flex gap-3">
                <button class="btn btn-light flex-fill rounded-3 shadow-sm" value="7">7</button>
                <button class="btn btn-light flex-fill rounded-3 shadow-sm" value="8">8</button>
                <button class="btn btn-light flex-fill rounded-3 shadow-sm" value="9">9</button>
                <button class="btn btn-warning flex-fill rounded-3 shadow-sm" value="+">+</button>
              </div>

              <div class="d-flex gap-3">
                <button class="btn btn-light flex-fill rounded-3 shadow-sm" value="4">4</button>
                <button class="btn btn-light flex-fill rounded-3 shadow-sm" value="5">5</button>
                <button class="btn btn-light flex-fill rounded-3 shadow-sm" value="6">6</button>
                <button class="btn btn-warning flex-fill rounded-3 shadow-sm" value="-">-</button>
              </div>

              <div class="d-flex gap-3">
                <button class="btn btn-light flex-fill rounded-3 shadow-sm" value="1">1</button>
                <button class="btn btn-light flex-fill rounded-3 shadow-sm" value="2">2</button>
                <button class="btn btn-light flex-fill rounded-3 shadow-sm" value="3">3</button>
                <button class="btn btn-warning flex-fill rounded-3 shadow-sm" value="*">*</button>
              </div>

              <div class="d-flex gap-3">
                <button class="btn btn-light flex-fill rounded-3 shadow-sm" value="0">0</button>
                <button class="btn btn-light flex-fill rounded-3 shadow-sm" value=".">.</button>
                <button class="btn btn-warning flex-fill rounded-3 shadow-sm" value="%">%</button>
                <button class="btn btn-warning flex-fill rounded-3 shadow-sm" value="/">/</button>
              </div>

              <div class="d-flex gap-3">
                <button class="btn btn-outline-danger flex-fill rounded-3 shadow-sm" value="C">C</button>
                <button class="btn btn-success flex-fill rounded-3 shadow-sm" value="=">=</button>
              </div>

            </div>
          </div>

        </div>
      </div>
    </div>
  </section>
</main>



  <script src="/scripts/bundle.min.js"></script>
  <script src="/scripts/main.min.js"></script>

</body>
</html>
