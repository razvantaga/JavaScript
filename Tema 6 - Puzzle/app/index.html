{% extends "partials/layout.html" %}

{% block content %}

<main>
  <section>
    <div class="container text-center mt-4">

      <h2>Puzzle</h2>

      <!-- GRID 3x3 -->
      <div id="grid" class="row mx-auto" style="width:300px;"></div>

      <!-- SLIDER (Slick) -->
      <div id="pieces" class="mt-4"></div>

      <!-- SUBMIT BUTTON -->
      <button id="submitBtn" class="btn btn-success mt-3 d-none">
        Submit
      </button>

      <!-- MESSAGE -->
      <div id="message" class="mt-3"></div>

    </div>
  </section>
</main>

{% endblock %}
