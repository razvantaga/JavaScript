<section>

    <div class="quiz-wrapper" id="quizWrapper">
      <h1 id="quizTitle">This is the first question</h1>
      <ul>
        <li class="answer">This is the answer one</li>
        <li class="answer">This is the answer two</li>
        <li class="answer">This is the answer three</li>
